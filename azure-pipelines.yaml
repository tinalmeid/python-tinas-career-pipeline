
# yaml-language-server: $schema=https://json.schemastore.org/azure-pipelines
# azure-pipelines.yml
# ===================================================================================
# OBJETIVO       : Pipeline de CI para o python-tinas-career-pipeline
#                  Detecta Python via requirements.txt, roda testes com cobertura
#                  e envia métricas de observabilidade para Datadog, Loki e Prometheus.
#
# SUPORTE        : Python 3.12
# QUALIDADE      : SonarCloud (cobertura + análise estática)
# OBSERVABILIDADE: Datadog + Loki (Grafana Cloud) + Prometheus Pushgateway
#
# AUTOR          : Cristina de Almeida
# DATA           : Abril de 2026
# VERSION        : 1.0.2
# ===================================================================================
# É necessário configurar a pipeline no Azure DevOps:
# 1. Vá em Pipelines -> New Pipeline.
# 2. Selecione Azure Repos Git.
# 3. Selecione seu repositório.
# 4. Escolha Existing Azure Pipelines YAML file.
# 5. Aponte para o caminho azure-pipelines.yaml.

# --------------------------------------------------------------
# GATILHO: Executa em pushes e PRs para a branch main
# -----------------------------------------------------------------------------------
trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

# -----------------------------------------------------------------------------------
# AGENTE: Ubuntu gratuito (Azure Free Tier)
# -----------------------------------------------------------------------------------
pool:
  vmImage: 'ubuntu-latest'

# ===================================================================================
# VARIÁVEIS GLOBAIS
# Centraliza valores que mudam entre projetos.
# ===================================================================================
# `SONAR_PROJECT_KEY` e `SONAR_PROJECT_NAME` são os únicos valores que mudam.
variables:
  # =================================================================================
  # VARIABLE GROUP — segredos gerenciados na Library do Azure DevOps
  # =================================================================================
  # Contém: DATADOG_API_KEY (secreta, valor mascarado nos logs)
  # Caminho: Pipelines > Library > DATADOG_API_KEY > Pipeline permissions
  # ATENÇÃO: quando se usa `- group`, TODAS as variáveis precisam do formato
  #          `- name / value` abaixo — não é possível misturar os dois estilos.
  # =================================================================================
  - group: DATADOG_API_KEY

  # --- SonarCloud ---
  - name: SONAR_ORGANIZATION
    value: 'tinalmeid'               # Slug da organização no sonarcloud.io

  - name: SONAR_PROJECT_KEY
    value: 'tinalmeid_python-tinas-career-pipeline'   # Project Key gerado no SonarCloud

  - name: SONAR_PROJECT_NAME
    value: 'tinalmeid_python-tinas-career-pipeline'             # Nome de exibição (pode conter espaços)

  - name: SONAR_SERVICE_CONNECTION
    value: 'SonarCloud-Service-Connection' # Nome exato cadastrado em Project Settings > Service Connections

  # --- Versões de runtime ---
  - name: PYTHON_VERSION
    value: '3.10'   # Python 3.10+ — suporte a typing moderno

  - name: NODE_VERSION
    value: '18'     # Node.js 18 LTS

  - name: DOTNET_VERSION
    value: '8.x'    # .NET SDK — usado pela task UseDotNet@2

  # (WIP) Versões reservadas para linguagens ainda não implementadas
  - name: CSHARP_VERSION
    value: '10.0'   # (WIP) C# 10 — requer .NET 6+

  - name: CPLUSPLUS_VERSION
    value: '17'     # (WIP) C++17

  - name: KOTLIN_VERSION
    value: '1.8'    # (WIP) Kotlin 1.8+

  - name: JAVA_VERSION
    value: '17'     # (WIP) Java 17 LTS

  # --- Flags de linguagem (preenchidas automaticamente no Step 1) ---
  - name: isPython
    value: 'false'

  - name: isCSharp
    value: 'false'

  - name: isCpp
    value: 'false'

  - name: isKotlin
    value: 'false'

  - name: isJava
    value: 'false'

  - name: isJS
    value: 'false'  # JavaScript / Node.js — detectado via package.json

  # --- Observabilidade ---
  # DATADOG_API_KEY vem do group acima (secreta)
  - name: DATADOG_API_URL
    value: 'https://api.datadoghq.com/api/v1/series'

  - name: LOKI_URL
    value: 'http://seu-loki:3100'       # Grafana Cloud ou instância própria

  - name: PUSHGATEWAY_URL
    value: 'http://seu-pushgateway:9091' # Ponte obrigatória — Prometheus é pull-based

  - name: OBS_JOB_NAME
    value: 'azure-pipeline'              # Label usado em todas as métricas e logs

# ===================================================================================
# JOB PRINCIPAL
# ===================================================================================
jobs:
- job: SmartBuild
  displayName: '🤖 Build & Quality — Detecção Automática'

  steps:

    # ===============================================================================
    # PASSO 0 — CHECKOUT
    # ===============================================================================
    # fetch-depth: 0  →  OBRIGATÓRIO para o SonarCloud calcular "New Code".
    # Com depth parcial, o Sonar não consegue comparar com o histórico anterior.
    # ===============================================================================
    - checkout: self
      fetchDepth: 0
      displayName: '📥 Checkout do Código (histórico completo)'

    # ===============================================================================
    # PASSO 0b — CAPTURAR TIMESTAMP DE INÍCIO
    # ===============================================================================
    # Salva o epoch Unix no início para calcular a duração total do pipeline.
    # Usado pelo Passo 7 para enviar a métrica de tempo de build ao Datadog
    # e ao Pushgateway (Prometheus). Deve ficar logo após o checkout.
    # ===============================================================================
    - script: |
        echo "##vso[task.setvariable variable=PIPELINE_START_TIME]$(date +%s)"
        echo "⏱️  Timestamp de início registrado: $(date +%s)"
      displayName: '⏱️  Registrar Início do Pipeline'

      # =============================================================================
    # PASSO 1 — DETECÇÃO DA LINGUAGEM
    # ===============================================================================
    # Estratégia: verificar a existência dos arquivos de manifesto de cada ecossistema:
    # - Python: requirements.txt ou pyproject.toml
    # - C#/.NET: qualquer arquivo com extensão .csproj
    # - C++: CMakeLists.txt ou Makefile
    # - Java: pom.xml (Maven) ou build.gradle (Gradle)
    # - Kotlin: build.gradle.kts (Gradle Kotlin DSL) ou pom.xml (Maven)
    # - JavaScript/Node.js: package.json
    # Apenas uma linguagem é ativada por execução.
    # Caso nenhuma seja detectada, o pipeline falha com mensagem clara.
    # ===============================================================================
    - script: |
        echo "🔍 Inspecionando arquivos do repositório..."

        if [ -f "requirements.txt" ] || [ -f "pyproject.toml" ]; then
          echo "✅ Linguagem detectada: Python"
          echo "##vso[task.setvariable variable=isPython]true"

        elif ls *.csproj 2>/dev/null | grep -q .; then
          echo "✅ Linguagem detectada: C# / .NET"
          echo "##vso[task.setvariable variable=isCSharp]true"

        elif [ -f "CMakeLists.txt" ] || [ -f "Makefile" ]; then
          echo "✅ Linguagem detectada: C++"
          echo "##vso[task.setvariable variable=isCpp]true"

        elif [ -f "build.gradle.kts" ]; then
          echo "✅ Linguagem detectada: Kotlin (Gradle Kotlin DSL)"
          echo "##vso[task.setvariable variable=isKotlin]true"

        elif [ -f "pom.xml" ] || [ -f "build.gradle" ]; then
          echo "✅ Linguagem detectada: Java"
          echo "##vso[task.setvariable variable=isJava]true"

        elif [ -f "package.json" ]; then
          echo "✅ Linguagem detectada: JavaScript / Node.js"
          echo "##vso[task.setvariable variable=isJS]true"

        else
          echo "##[error] ❌ Nenhum manifesto reconhecido encontrado."
          echo "##[error]    Esperado: requirements.txt | pyproject.toml | package.json | *.csproj"
          exit 1
        fi
      displayName: '🧐 Identificando Tecnologia do Repositório'

    # ===============================================================================
    # PASSO 2 — SETUP DE RUNTIME (condicional por linguagem)
    # ===============================================================================

    # Python e Node.js são os mais comuns, então ficam primeiro.
    - task: UsePythonVersion@0
      condition: eq(variables['isPython'], 'true')
      inputs:
        versionSpec: $(PYTHON_VERSION)
      displayName: '🐍 Configurar Python $(PYTHON_VERSION)'

    - task: UseDotNet@2
      condition: eq(variables['isCSharp'], 'true')
      inputs:
        packageType: 'sdk'
        version:     '8.x'
      displayName: '⚙️  Configurar .NET SDK 8.x'

    - task: NodeTool@0
      condition: eq(variables['isJS'], 'true')
      inputs:
        versionSpec: $(NODE_VERSION)
      displayName: '📦 Configurar Node.js $(NODE_VERSION)'

    # Java, Kotlin e C++ exigem configuração via script (SDKMAN / apt-get) — (WIP)

    # ===============================================================================
    # PASSO 3 — PREPARAR ANÁLISE SONARCLOUD
    # ===============================================================================
    # scannerMode 'CLI' é o modo correto para Python e JavaScript.
    # Para .NET (MSBuild), o Sonar envolve o build diretamente — veja Passo 4c.
    # ===============================================================================
    # CORREÇÃO: Atualizado de SonarCloudPrepare@1 para SonarCloudPrepare@3
    # ===============================================================================
    - task: SonarCloudPrepare@3
      condition: or(eq(variables['isPython'], 'true'), eq(variables['isJS'], 'true'))
      inputs:
        SonarCloud:  $(SONAR_SERVICE_CONNECTION)
        organization: $(SONAR_ORGANIZATION)
        scannerMode: 'CLI'
        configMode:  'manual'
        cliProjectKey:  $(SONAR_PROJECT_KEY)
        cliProjectName: $(SONAR_PROJECT_NAME)
        extraProperties: |
          sonar.python.coverage.reportPaths=$(System.DefaultWorkingDirectory)/coverage.xml
          sonar.javascript.lcov.reportPaths=$(System.DefaultWorkingDirectory)/coverage/lcov.info
          sonar.sources=src
          sonar.tests=tests
      displayName: '🏗️  Preparar SonarCloud (Python / JS)'

    # C#, C++
    # Aponta para o XML no formato OpenCover gerado pelo Passo 4c.
    # O glob "**/" é necessário porque o dotnet test cria uma subpasta
    # com GUID aleatório dentro de TestResults a cada execução.
    # (WIP)

    # Java e Kotlin
    # (WIP)

    # JS e Node.js
    # (WIP)

    # ===============================================================================
    # PASSO 4 — INSTALAR DEPENDÊNCIAS + RODAR TESTES + CORREÇÃO DE CAMINHOS
    # ===============================================================================
    # O pytest-cov gera caminhos absolutos; o SonarCloud espera caminhos
    # relativos a partir da raiz do projeto (ex: "src/modulo.py").
    # A substituição abaixo remove o prefixo absoluto deixando só "src/...".
    # A flag "-E" usa regex estendida para capturar qualquer prefixo de path.
    # ===============================================================================

    # --- 4a. Python ---
    - script: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov
      condition: eq(variables['isPython'], 'true')
      displayName: '📦 Instalar dependências Python'

    - script: |
        pytest --cov=src --cov-report=xml
      condition: eq(variables['isPython'], 'true')
      displayName: '🧪 Testes Python + Cobertura'

    - script: |
        if grep -q 'filename="src/' coverage.xml; then
          echo "ℹ️  Caminhos já estão no formato correto. Nenhuma correção necessária."
        else
          echo "🔨 Corrigindo caminhos absolutos no coverage.xml..."
          sed -i -E 's|filename="[^"]*/src/|filename="src/|g' coverage.xml
          echo "✅ Correção aplicada."
        fi
        echo "📄 Amostra do arquivo corrigido:"
        grep "filename=" coverage.xml | head -n 5
      condition: eq(variables['isPython'], 'true')
      displayName: '🚑 Corrigir Caminhos no coverage.xml'

    # --- 4b. C# / .NET ---
    # ===============================================================================
    # FORMATO OPENCOVER — OBRIGATÓRIO PARA O SONARCLOUD
    # ===============================================================================
    # O XPlat Code Coverage gera Cobertura por padrão, mas o SonarScanner
    # para .NET (MSBuild) só lê o formato OpenCover.
    # A flag "-- DataCollectionRunSettings..." sobrescreve o formato em runtime,
    # sem precisar de um arquivo .runsettings separado no repositório.
    # ===============================================================================
    # (WIP)

    # --- 4c. C++ ---
    # (WIP)

    # --- 4d. Java e Kotlin ---
    # (WIP)

    # --- 4e. JavaScript / Node.js ---
    # (WIP)

    # ===============================================================================
    # PASSO 5 — EXECUTAR E PUBLICAR ANÁLISE SONARCLOUD
    # ===============================================================================
    # CORREÇÃO: Atualizado de SonarCloudAnalyze@1 para SonarCloudAnalyze@3
    # ===============================================================================
    - task: SonarCloudAnalyze@3
      displayName: '🚀 Executar Scan SonarCloud'

    # ===============================================================================
    # CORREÇÃO: Atualizado de SonarCloudPublish@1 para SonarCloudPublish@3
    # ===============================================================================
    - task: SonarCloudPublish@3
      inputs:
        pollingTimeoutSec: '300'
      displayName: '📊 Publicar Métricas no Dashboard'

    # ===============================================================================
    # PASSO 6 — PUBLICAR RESULTADOS DE TESTES NO AZURE (opcional, mas útil)
    # ===============================================================================
    # Exibe os resultados na aba "Tests" dentro do pipeline no Azure DevOps.
    # ===============================================================================
    - task: PublishTestResults@2
      condition: always()
      inputs:
        testResultsFormat: 'JUnit'
        testResultsFiles:  '**/test-results*.xml'
        failTaskOnFailedTests: true
      displayName: '📋 Publicar Resultados de Testes'

    # ===============================================================================
    # COBERTURA NO AZURE DEVOPS
    # ===============================================================================
    # O Azure DevOps detecta e exibe cobertura automaticamente quando:
    #   - Python/JS : o arquivo coverage.xml (formato Cobertura) está na raiz
    #   - .NET      : o OpenCover XML está em TestResults/
    #   - C++       : o formato e localização dependem da configuração do SonarCloud
    #   - Java/Kotlin: o formato e localização dependem da configuração do SonarCloud
    #   - JS/Node.js : o arquivo lcov.info está na pasta coverage/
    # O SonarCloud também publica cobertura no seu próprio dashboard.
    # Nenhuma task adicional é necessária — as duas fontes já cobrem isso.
    # ===============================================================================

    # ===============================================================================
    # PASSO 7 — ENVIAR MÉTRICAS DE OBSERVABILIDADE (Datadog, Loki, Prometheus)
    # ===============================================================================
    #
    #  ARQUITETURA DAS TRÊS FERRAMENTAS:
    #
    #  ┌─────────────┐   push    ┌─────────────┐  scrape  ┌─────────────┐
    #  │   Pipeline  │ ────────► │ Pushgateway │ ───────► │ Prometheus  │
    #  │  (este yml) │           │  (bridge)   │          │  + Grafana  │
    #  └─────────────┘           └─────────────┘          └─────────────┘
    #        │
    #        │  push (HTTP POST)
    #        ▼
    #  ┌─────────────┐
    #  │    Loki     │  ◄── pesquisa de logs no Grafana
    #  └─────────────┘
    #        │
    #        │  push (HTTP POST)
    #        ▼
    #  ┌─────────────┐
    #  │   Datadog   │  ◄── dashboard de saúde do CI/CD
    #  └─────────────┘
    #
    #  IMPORTANTE: Os passos 7a e 7b usam `condition` opostas para garantir
    #  que SEMPRE chegue um sinal — seja de sucesso ou de falha.
    #  Métricas de observabilidade NUNCA devem quebrar o build (|| true).
    #
    #  SEGURANÇA: Todas as variáveis do Azure DevOps são passadas via `env:`
    #  para evitar injeção de código (SonarCloud Security Blocker).
    # ==========================================================================

    # --- 7a. Observabilidade: SUCESSO ---
    - script: |
        # --- Calcular duração do pipeline ---
        END_TIME=$(date +%s)
        DURATION=$((END_TIME - START_TIME))
        TIMESTAMP=$(date +%s)

        echo "✅ Build concluído em ${DURATION}s. Enviando métricas..."
        echo "📊 Métrica: pipeline.build.duration, Valor: ${DURATION}s, Branch: ${BRANCH}, Projeto: ${PROJECT}"

        # ------------------------------------------------------------------
        # 1. DATADOG — Saúde da infraestrutura e CI/CD
        # ------------------------------------------------------------------
        # Tags permitem filtrar por projeto/branch no dashboard do Datadog.
        # Enviamos duas métricas: status (1=ok) e duração em segundos.
        # Usa $DD_API_KEY que foi injetado via `env:` no final deste step.
        # ------------------------------------------------------------------
        # Resolve a linguagem antes de montar o JSON — evita lógica dentro do curl
        if   [ "$IS_PYTHON" = 'true' ];  then LANG_TAG="python"
        elif [ "$IS_JS"     = 'true' ];  then LANG_TAG="javascript"
        elif [ "$IS_CSHARP" = 'true' ];  then LANG_TAG="dotnet"
        elif [ "$IS_CPP"    = 'true' ];  then LANG_TAG="cpp"
        elif [ "$IS_JAVA"   = 'true' ];  then LANG_TAG="java"
        elif [ "$IS_KOTLIN" = 'true' ];  then LANG_TAG="kotlin"
        else                                  LANG_TAG="unknown"
        fi
        echo "🏷️  Linguagem identificada para Datadog: $LANG_TAG"

        curl --silent --fail-with-body \
          -X POST "$DATADOG_URL" \
          -H "Content-Type: application/json" \
          -H "DD-API-KEY: $DD_API_KEY" \
          -d "{
            \"series\": [
              {
                \"metric\": \"cdd.pipeline.success\",
                \"points\": [[$TIMESTAMP, 1]],
                \"tags\": [\"project:$PROJECT\", \"branch:$BRANCH\", \"language:$LANG_TAG\"]
              },
              {
                \"metric\": \"cdd.pipeline.duration_seconds\",
                \"points\": [[$TIMESTAMP, $DURATION]],
                \"tags\": [\"project:$PROJECT\", \"branch:$BRANCH\", \"language:$LANG_TAG\"]
              }
            ]
          }" \
          && echo "📡 Datadog: métricas enviadas." \
          || echo "⚠️  Datadog: falha ao enviar métricas (não crítico)."

        # ------------------------------------------------------------------
        # 2. LOKI — Centralização de logs
        # ------------------------------------------------------------------
        # O Loki recebe logs via HTTP POST no endpoint /loki/api/v1/push.
        # `streams` é a unidade de agrupamento; cada stream tem labels (como
        # tags no Datadog) e `values` que é um array de [timestamp_ns, mensagem].
        # O timestamp precisa estar em NANOSSEGUNDOS (epoch * 10^9).
        # ------------------------------------------------------------------
        LOKI_TIMESTAMP="${TIMESTAMP}000000000"  # Converte segundos → nanossegundos

        curl --silent --fail-with-body \
          -X POST "$LOKI_ENDPOINT/loki/api/v1/push" \
          -H "Content-Type: application/json" \
          -d "{
            \"streams\": [{
              \"stream\": {
                \"job\":     \"$JOB_NAME\",
                \"project\": \"$PROJECT\",
                \"branch\":  \"$BRANCH\",
                \"status\":  \"success\"
              },
              \"values\": [[
                \"$LOKI_TIMESTAMP\",
                \"[SUCCESS] Pipeline concluído em ${DURATION}s | Build=$BUILD_ID | Commit=$COMMIT\"
              ]]
            }]
          }" \
          && echo "📋 Loki: log de sucesso enviado." \
          || echo "⚠️  Loki: falha ao enviar log de sucesso (não crítico)."

        # ------------------------------------------------------------------
        # 3. PROMETHEUS PUSHGATEWAY — Métricas de negócio e dados
        # ------------------------------------------------------------------
        # O Prometheus é PULL-BASED: ele não aceita dados diretamente.
        # O Pushgateway funciona como uma caixa de entrada: o pipeline EMPURRA
        # métricas para lá, e o Prometheus as COLETA periodicamente.
        #
        # Formato do payload: texto simples (exposition format do Prometheus).
        # Cada linha define: # HELP (descrição), # TYPE (tipo) e o valor.
        # A URL inclui /metrics/job/<nome> para organizar no Prometheus.
        # ------------------------------------------------------------------
        cat <<EOF | curl --silent --fail-with-body \
          --data-binary @- \
          "$PUSHGATEWAY_ENDPOINT/metrics/job/$JOB_NAME/instance/$PROJECT"

        # HELP cdd_pipeline_success Resultado do pipeline (1=sucesso, 0=falha)
        # TYPE cdd_pipeline_success gauge
        cdd_pipeline_success{branch="$BRANCH",project="$PROJECT"} 1

        # HELP cdd_pipeline_duration_seconds Duração total do pipeline em segundos
        # TYPE cdd_pipeline_duration_seconds gauge
        cdd_pipeline_duration_seconds{branch="$BRANCH",project="$PROJECT"} $DURATION
        EOF

        echo "📊 Pushgateway: métricas de sucesso enviadas ao Prometheus." \
          || echo "⚠️  Pushgateway: falha ao enviar métricas (não crítico)."

      condition: succeeded()
      displayName: '📡 Observabilidade — Sucesso (Datadog + Loki + Prometheus)'
      env:
        # SEGURANÇA: Variáveis passadas via env: para evitar injeção de código
        DD_API_KEY: $(DATADOG_API_KEY)
        BRANCH: $(Build.SourceBranchName)
        PROJECT: $(System.TeamProject)
        BUILD_ID: $(Build.BuildId)
        COMMIT: $(Build.SourceVersion)
        DATADOG_URL: $(DATADOG_API_URL)
        LOKI_ENDPOINT: $(LOKI_URL)
        PUSHGATEWAY_ENDPOINT: $(PUSHGATEWAY_URL)
        JOB_NAME: $(OBS_JOB_NAME)
        START_TIME: $(PIPELINE_START_TIME)
        IS_PYTHON: $(isPython)
        IS_JS: $(isJS)
        IS_CSHARP: $(isCSharp)
        IS_CPP: $(isCpp)
        IS_JAVA: $(isJava)
        IS_KOTLIN: $(isKotlin)

    # --- 7b. Observabilidade: FALHA ---
    # Espelho do 7a, mas com condition: failed().
    # Sem ele a falha no pipeline gera silêncio no dashboard — indistinguível de um build que simplesmente
    # ainda não rodou. Silence ≠ OK em observabilidade.
    - script: |
        TIMESTAMP=$(date +%s)
        LOKI_TIMESTAMP="${TIMESTAMP}000000000"

        echo "❌ Build falhou. Enviando alertas de falha..."

        # Datadog — métrica de falha
        curl --silent \
          -X POST "$DATADOG_URL" \
          -H "Content-Type: application/json" \
          -H "DD-API-KEY: $DD_API_KEY" \
          -d "{
            \"series\": [{
              \"metric\": \"cdd.pipeline.failure\",
              \"points\": [[$TIMESTAMP, 1]],
              \"tags\": [\"project:$PROJECT\", \"branch:$BRANCH\"]
            }]
          }" \
          && echo "📡 Datadog: alerta de falha enviado." \
          || echo "##[warning] Datadog: falha ao enviar alerta."

        # Loki — log de falha (possível pesquisar no Grafana)
        curl --silent \
          -X POST "$LOKI_ENDPOINT/loki/api/v1/push" \
          -H "Content-Type: application/json" \
          -d "{
            \"streams\": [{
              \"stream\": {
                \"job\":     \"$JOB_NAME\",
                \"project\": \"$PROJECT\",
                \"branch\":  \"$BRANCH\",
                \"status\":  \"failure\"
              },
              \"values\": [[
                \"$LOKI_TIMESTAMP\",
                \"[FAILURE] Pipeline falhou | Build=$BUILD_ID | Commit=$COMMIT\"
              ]]
            }]
          }" \
          && echo "📋 Loki: log de falha enviado." \
          || echo "⚠️  Loki: falha ao enviar log."

        # Pushgateway — métrica de falha para o Prometheus
        printf '# HELP cdd_pipeline_success Resultado do pipeline\n# TYPE cdd_pipeline_success gauge\ncdd_pipeline_success{branch="%s",project="%s"} 0\n' \
          "$BRANCH" "$PROJECT" \
          | curl --silent --data-binary @- \
            "$PUSHGATEWAY_ENDPOINT/metrics/job/$JOB_NAME/instance/$PROJECT" \
          && echo "📊 Pushgateway: métrica de falha enviada." \
          || echo "##[warning] Pushgateway: falha ao enviar métrica."

      condition: failed()
      displayName: '🚨 Observabilidade — Falha (Datadog + Loki + Prometheus)'
      env:
        # SEGURANÇA: Variáveis passadas via env: para evitar injeção de código
        DD_API_KEY: $(DATADOG_API_KEY)
        BRANCH: $(Build.SourceBranchName)
        PROJECT: $(System.TeamProject)
        BUILD_ID: $(Build.BuildId)
        COMMIT: $(Build.SourceVersion)
        DATADOG_URL: $(DATADOG_API_URL)
        LOKI_ENDPOINT: $(LOKI_URL)
        PUSHGATEWAY_ENDPOINT: $(PUSHGATEWAY_URL)
        JOB_NAME: $(OBS_JOB_NAME)

# @file Fim do arquivo azure-pipelines.yaml
