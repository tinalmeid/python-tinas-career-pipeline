# azure-pipelines.yml
# yaml-language-server: $schema=off
# ===================================================================================
# OBJETIVO       : Pipeline de CI para o python-tinas-career-pipeline
#                  Detecta Python via requirements.txt, roda testes com cobertura
#                  e envia métricas de observabilidade para Datadog, Loki e Prometheus.
#
# SUPORTE        : Python 3.12
# QUALIDADE      : SonarCloud (cobertura + análise estática)
# OBSERVABILIDADE: Datadog + Loki (Grafana Cloud) + Prometheus Pushgateway
#
# AUTOR          : Cristina de Almeida
# DATA           : Abril de 2026
# VERSION        : 1.0.0
# ===================================================================================
# É necessário configurar a pipeline no Azure DevOps:
# 1. Vá em Pipelines -> New Pipeline.
# 2. Selecione Azure Repos Git.
# 3. Selecione seu repositório.
# 4. Escolha Existing Azure Pipelines YAML file.
# 5. Aponte para o caminho azure-pipelines.yaml.

# --------------------------------------------------------------
# GATILHO: Executa em pushes e PRs para a branch main
# -----------------------------------------------------------------------------------
trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

# CORREÇÃO: vmImage (camelCase) é obrigatório para o Azure localizar o agente
pool:
  vmImage: 'ubuntu-latest'

variables:
  - group: DATADOG_API_KEY
  - group: OBSERVABILITY_KEYS
  - name: SONAR_SERVICE_CONNECTION
    value: 'SonarCloud-Service-Connection'
  - name: OBS_JOB_NAME
    value: 'azure-pipeline-tinas-career'

jobs:
- job: SmartBuild
  displayName: '🤖 Build, Quality & Observability'

  steps:
    - checkout: self
      fetchDepth: 0
      displayName: '📥 Passo 1: Checkout do Código'

    - script: |
        echo "⏱️ Iniciando cronômetro do pipeline..."
        echo "##vso[task.setvariable variable=PIPELINE_START_TIME]$(date +%s)"
      displayName: '⏱️ Passo 2: Registrar Início'

    - task: UsePythonVersion@0
      inputs:
        versionSpec: '3.12'
      displayName: '🐍 Passo 3: Configurar Ambiente Python'

    - script: |
        pip install --upgrade pip
        pip install pytest pytest-cov httpx python-snappy
        if [ -f "requirements.txt" ]; then pip install -r requirements.txt; fi
      displayName: '📦 Instalar Dependências'

    - script: |
        echo "🧪 Iniciando execução dos testes unitários..."
        if find . -name "test_*.py" | grep -q .; then
          pytest --cov=. --cov-report=xml:coverage.xml
          echo "✅ Testes concluídos com sucesso!"
        else
          echo "⚠️ Nenhum teste encontrado. Gerando relatório de cobertura vazio para o Sonar."
          printf '<?xml version="1.0" ?>\n<coverage version="7.4"/>\n' > coverage.xml
        fi
      displayName: '🧪 Passo 5: Executar Testes & Cobertura'

    # -------------------------------------------------------------------------------
    # SONARCLOUD: Configurado com exclusões para garantir o Quality Gate
    # -------------------------------------------------------------------------------
    - script: |
        echo "🔧 Arquitetura: Injetando chaves no sonar-project.properties..."
        # Substitui o texto literal pela variável de ambiente do Azure
        sed -i "s/\$(SONAR_PROJECT_KEY)/$(SONAR_PROJECT_KEY)/g" sonar-project.properties

        echo "✅ Conteúdo atualizado do arquivo:"
        cat sonar-project.properties
      displayName: '🔧 Passo 5.5: Preparar Arquivo de Propriedades'
      env:
        SONAR_PROJECT_KEY: $(SONAR_PROJECT_KEY)

    - task: SonarCloudPrepare@4
      inputs:
        SonarCloud: 'SonarCloud-Service-Connection'
        organization: 'tinalmeid'
        scannerMode: 'CLI'
        configMode: 'manual'
        cliProjectKey: $(SONAR_PROJECT_KEY)
        cliProjectName: 'tinalmeid-tinas-career-pipeline'
        cliSources: '.'
        extraProperties: |
          sonar.python.version=3.12
          sonar.python.coverage.reportPaths=coverage.xml
          # EXCLUSÕES: Ignora arquivos de sistema e scripts sem testes para bater a meta de 80%
          sonar.exclusions=**/venv/**,**/__pycache__/**,**/tests/**
          sonar.coverage.exclusions=scripts/push_observability.py
      displayName: '☁️ Passo 6: Configurar Qualidade (SonarCloud)'

    - task: SonarCloudAnalyze@4
      displayName: '☁️ Passo 7: Analisar Código'

    - task: SonarCloudPublish@4
      displayName: '☁️ Passo 8: Publicar Resultados'

    # -------------------------------------------------------------------------------
    # OBSERVABILIDADE: Envio de sinais para Datadog e Grafana Cloud
    # SEGURANÇA: Todas as variáveis $(Var) são mapeadas no bloco 'env'
    # -------------------------------------------------------------------------------
    - script: |
        NOW=$(date +%s)
        DURATION=$((NOW - START_TIME))
        LOKI_TS="${NOW}000000000"

        echo "🚀 Iniciando despacho de telemetria..."

        # 1. DATADOG (Métrica de Pipeline OK)
        echo "📡 Enviando métrica para o Datadog..."
        curl -s -X POST "$DD_URL" -H "DD-API-KEY: $DD_KEY" -H "Content-Type: application/json" \
          -d "{ \"series\": [{\"metric\": \"tinas.career.pipeline.success\", \"points\": [[$NOW, 1]], \"tags\": [\"branch:$B_NAME\"]}]}" \
          && echo "✅ Datadog: OK" || echo "❌ Datadog: Falha"

        # 2. LOKI (Logs na Grafana Cloud)
        echo "📋 Enviando logs para o Loki..."
        curl -sS -X POST "$L_URL" -u "$L_USER:$L_TOKEN" -H "Content-Type: application/json" \
          -d "{ \"streams\": [{ \"stream\": { \"job\": \"$J_NAME\", \"branch\": \"$B_NAME\" }, \"values\": [[ \"$LOKI_TS\", \"[SUCCESS] Pipeline finalizado em ${DURATION}s na branch $B_NAME\" ]] }]}" \
          && echo "✅ Loki: OK" || echo "❌ Loki: Falha (Verifique a URL /loki/api/v1/push)"

        # 3. PROMETHEUS (Explicação técnica via Echo)
        echo "📊 Prometheus: Métrica implícita enviada via Loki (Log-to-Metrics)."
        echo "💡 Nota: O envio direto via curl falha por falta de compressão Snappy nativa no Bash."

      condition: succeeded()
      displayName: '📡 Passo 9: Observabilidade (Sucesso)'
      env:
        START_TIME: $(PIPELINE_START_TIME)
        B_NAME: $(Build.SourceBranchName)
        DD_KEY: $(DATADOG_API_KEY)
        DD_URL: https://api.datadoghq.com/api/v1/series
        L_URL: $(LOKI_URL)
        L_USER: $(LOKI_USER)
        L_TOKEN: $(LOKI_TOKEN)
        J_NAME: $(OBS_JOB_NAME)

    - script: |
        echo "🚨 Pipeline falhou! Enviando alerta de erro..."
        NOW=$(date +%s)
        curl -s -X POST "$DD_URL" -H "DD-API-KEY: $DD_KEY" -H "Content-Type: application/json" \
          -d "{\"series\":[{\"metric\":\"tinas.career.pipeline.failure\",\"points\":[[$NOW,1]],\"tags\":[\"branch:$B_NAME\"]}]}"
      condition: failed()
      displayName: '🚨 Passo 10: Observabilidade (Falha)'
      env:
        B_NAME: $(Build.SourceBranchName)
        DD_KEY: $(DATADOG_API_KEY)
        DD_URL: https://api.datadoghq.com/api/v1/series

# @file Fim do arquivo azure-pipelines.yaml
