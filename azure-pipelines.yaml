# azure-pipelines.yml
# yaml-language-server: $schema=off
# ===================================================================================
# OBJETIVO       : Pipeline de CI para o python-tinas-career-pipeline
#                  Detecta Python via requirements.txt, roda testes com cobertura
#                  e envia métricas de observabilidade para Datadog, Loki e Prometheus.
#
# SUPORTE        : Python 3.12
# QUALIDADE      : SonarCloud (cobertura + análise estática)
# OBSERVABILIDADE: Datadog + Loki (Grafana Cloud) + Prometheus Pushgateway
#
# AUTOR          : Cristina de Almeida
# DATA           : Abril de 2026
# VERSION        : 1.0.0
# ===================================================================================
# É necessário configurar a pipeline no Azure DevOps:
# 1. Vá em Pipelines -> New Pipeline.
# 2. Selecione Azure Repos Git.
# 3. Selecione seu repositório.
# 4. Escolha Existing Azure Pipelines YAML file.
# 5. Aponte para o caminho azure-pipelines.yaml.

# --------------------------------------------------------------
# GATILHO: Executa em pushes e PRs para a branch main
# -----------------------------------------------------------------------------------
trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  - group: DATADOG_API_KEY
  - group: OBSERVABILITY_KEYS
  - name: SONAR_ORGANIZATION
    value: 'tinalmeid'
  - name: SONAR_PROJECT_KEY
    value: 'tinalmeid_python_tinas_career_pipeline'
  - name: SONAR_PROJECT_NAME
    value: 'python-tinas-career-pipeline'
  - name: SONAR_SERVICE_CONNECTION
    value: 'SonarCloud-Service-Connection'
  - name: PYTHON_VERSION
    value: '3.12'
  - name: DATADOG_API_URL
    value: 'https://api.datadoghq.com/api/v1/series'
  - name: OBS_JOB_NAME
    value: 'azure-pipeline-tinas-career'

jobs:
- job: SmartBuild
  displayName: '🤖 Build & Quality — python-tinas-career-pipeline'

  steps:
    - checkout: self
      fetchDepth: 0
      displayName: '📥 Checkout do Código'

    - script: |
        echo "##vso[task.setvariable variable=PIPELINE_START_TIME]$(date +%s)"
        echo "⏱️ Timestamp de início registrado"
      displayName: '⏱️ Registrar Início'

    - script: |
        if [ -f "requirements.txt" ]; then
          echo "✅ Python detectado"
        else
          echo "⚠️ Setup inicial"
        fi
      displayName: '🔍 Detectar Linguagem'

    - task: UsePythonVersion@0
      inputs:
        versionSpec: '$(PYTHON_VERSION)'
        addToPath: true
      displayName: '🐍 Configurar Python'

    - script: |
        pip install --upgrade pip
        pip install pytest pytest-asyncio pytest-cov httpx
        if [ -f "requirements.txt" ]; then
          pip install -r requirements.txt
        fi
      displayName: '📦 Instalar Dependências'

    - script: |
        if find . -name "test_*.py" | grep -q .; then
          pytest --cov=. --cov-report=xml:coverage.xml --cov-report=term-missing -v
        else
          echo "⚠️ Sem testes — Setup inicial"
          printf '<?xml version="1.0" ?>\n<coverage version="7.4"/>\n' > coverage.xml
        fi
      displayName: '🧪 Testes + Cobertura'

    - task: SonarCloudPrepare@4
      inputs:
        SonarCloud: '$(SONAR_SERVICE_CONNECTION)'
        organization: '$(SONAR_ORGANIZATION)'
        scannerMode: 'CLI'
        configMode: 'file'
      displayName: '☁️ SonarCloud — Preparar'

    - task: SonarCloudAnalyze@4
      displayName: '☁️ SonarCloud — Analisar'

    - task: SonarCloudPublish@4
      inputs:
        pollingTimeoutSec: '300'
      displayName: '☁️ SonarCloud — Publicar'

    # ===============================================================================
    # OBSERVABILIDADE — SUCESSO (Corrigido com Env Vars para Segurança e Auth)
    # ===============================================================================
    - script: |
        NOW=$(date +%s)
        DURATION=$((NOW - START_TIME))
        LOKI_TS="${NOW}000000000"

        echo "✅ Build concluído em ${DURATION}s. Enviando métricas..."

        # 1. DATADOG
        if [ -n "$DD_KEY" ]; then
          curl --silent --fail-with-body -X POST "$DD_URL" \
            -H "Content-Type: application/json" -H "DD-API-KEY: $DD_KEY" \
            -d "{ \"series\": [
                  {\"metric\": \"tinas.career.pipeline.success\", \"points\": [[$NOW, 1]], \"tags\": [\"branch:$B_NAME\"]},
                  {\"metric\": \"tinas.career.pipeline.duration\", \"points\": [[$NOW, $DURATION]], \"tags\": [\"branch:$B_NAME\"]}
                ]}" && echo "📡 Datadog: enviado" || echo "⚠️ Datadog: falha"
        fi

        # 2. LOKI (Simplificado para aprendizado)
        if [ -n "$L_URL" ]; then
         curl -v -X POST "$L_URL" -u "$L_USER:$L_TOKEN" \
           -H "Content-Type: application/json" \
           -d "{ \"streams\": [{ \"stream\": { \"job\": \"$J_NAME\" }, \"values\": [[ \"$(date +%s)000000000\", \"[SUCCESS] Pipeline finalizado na branch $B_NAME\" ]] }]}" \
           && echo "📋 Loki: enviado" || echo "⚠️ Loki: falha"
        fi


        # 3. PROMETHEUS (PUSHGATEWAY / REMOTE WRITE)
        if [ -n "$P_URL" ]; then
          printf 'tinas_career_pipeline_success{branch="%s"} 1\n' "$B_NAME" > metrics.txt
          curl --silent --fail-with-body -u "$P_USER:$P_TOKEN" --data-binary @metrics.txt "$P_URL" \
            && echo "📊 Prometheus: enviado" || echo "⚠️ Prometheus: falha"
        fi
      condition: succeeded()
      displayName: '📡 Observabilidade — Sucesso'
      env:
        START_TIME: $(PIPELINE_START_TIME)
        B_NAME: $(Build.SourceBranchName)
        DD_KEY: $(DATADOG_API_KEY)
        DD_URL: $(DATADOG_API_URL)
        L_URL: $(LOKI_URL)
        L_USER: $(LOKI_USER)
        L_TOKEN: $(LOKI_TOKEN)
        P_URL: $(PROMETHEUS_URL)
        P_USER: $(PROMETHEUS_USER)
        P_TOKEN: $(PROMETHEUS_TOKEN)
        J_NAME: $(OBS_JOB_NAME)

    # ===============================================================================
    # OBSERVABILIDADE — FALHA (Corrigido com Env Vars para Segurança e Auth)
    # ===============================================================================
    - script: |
        NOW=$(date +%s)
        LOKI_TS="${NOW}000000000"

        echo "❌ Build falhou. Enviando alertas..."

        if [ -n "$DD_KEY" ]; then
          curl --silent -X POST "$DD_URL" -H "DD-API-KEY: $DD_KEY" -H "Content-Type: application/json" \
            -d "{\"series\":[{\"metric\":\"tinas.career.pipeline.failure\",\"points\":[[$NOW,1]],\"tags\":[\"branch:$B_NAME\"]}]}" \
            && echo "📡 Datadog: enviado" || echo "⚠️ Datadog: falha"
        fi

        if [ -n "$L_URL" ]; then
          curl --silent -X POST "$L_URL" -u "$L_USER:$L_TOKEN" -H "Content-Type: application/json" \
            -d "{\"streams\":[{\"stream\":{\"job\":\"$J_NAME\",\"status\":\"failure\"},\"values\":[[\"$LOKI_TS\",\"Pipeline falhou na branch $B_NAME\"]]}]}" \
            && echo "📋 Loki: enviado" || echo "⚠️ Loki: falha"
        fi
      condition: failed()
      displayName: '🚨 Observabilidade — Falha'
      env:
        B_NAME: $(Build.SourceBranchName)
        DD_KEY: $(DATADOG_API_KEY)
        DD_URL: $(DATADOG_API_URL)
        L_URL: $(LOKI_URL)
        L_USER: $(LOKI_USER)
        L_TOKEN: $(LOKI_TOKEN)
        J_NAME: $(OBS_JOB_NAME)

# @file Fim do arquivo azure-pipelines.yaml
