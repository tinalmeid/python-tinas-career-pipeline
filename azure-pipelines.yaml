# yaml-language-server: $schema=https://json.schemastore.org/azure-pipelines
# azure-pipelines.yml
# ===================================================================================
# OBJETIVO       : Pipeline de CI para o python-tinas-career-pipeline
#                  Detecta Python via requirements.txt, roda testes com cobertura
#                  e envia métricas de observabilidade para Datadog, Loki e Prometheus.
#
# SUPORTE        : Python 3.12
# QUALIDADE      : SonarCloud (cobertura + análise estática)
# OBSERVABILIDADE: Datadog + Loki (Grafana Cloud) + Prometheus Pushgateway
#
# AUTOR          : Cristina de Almeida
# DATA           : Abril de 2026
# VERSION        : 1.0.2
# ===================================================================================
# É necessário configurar a pipeline no Azure DevOps:
# 1. Vá em Pipelines -> New Pipeline.
# 2. Selecione Azure Repos Git.
# 3. Selecione seu repositório.
# 4. Escolha Existing Azure Pipelines YAML file.
# 5. Aponte para o caminho azure-pipelines.yaml.

# --------------------------------------------------------------
# GATILHO: Executa em pushes e PRs para a branch main
# -----------------------------------------------------------------------------------
trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  # Variable Groups (secrets da Library)
  - group: DATADOG_API_KEY
  - group: OBSERVABILITY_KEYS

  # SonarCloud
  - name: SONAR_ORGANIZATION
    value: 'tinalmeid'

  - name: SONAR_PROJECT_KEY
    value: 'tinalmeid_python-tinas-career-pipeline'

  - name: SONAR_PROJECT_NAME
    value: 'tinalmeid_python-tinas-career-pipeline'

  - name: SONAR_SERVICE_CONNECTION
    value: 'SonarCloud-Service-Connection'

  # Versoes de runtime
  - name: PYTHON_VERSION
    value: '3.10'

  - name: NODE_VERSION
    value: '18'

  - name: DOTNET_VERSION
    value: '8.x'

  - name: CSHARP_VERSION
    value: '10.0'

  - name: CPLUSPLUS_VERSION
    value: '17'

  - name: KOTLIN_VERSION
    value: '1.8'

  - name: JAVA_VERSION
    value: '17'

  # Flags de linguagem
  - name: isPython
    value: 'false'

  - name: isCSharp
    value: 'false'

  - name: isCpp
    value: 'false'

  - name: isKotlin
    value: 'false'

  - name: isJava
    value: 'false'

  - name: isJS
    value: 'false'

  # Observabilidade
  - name: DATADOG_API_URL
    value: 'https://api.datadoghq.com/api/v1/series'

  - name: OBS_JOB_NAME
    value: 'azure-pipeline'

jobs:
- job: SmartBuild
  displayName: 'Build and Quality - Deteccao Automatica'

  steps:

    # ===============================================================================
    # PASSO 0 - CHECKOUT
    # ===============================================================================
    - checkout: self
      fetchDepth: 0
      displayName: 'Checkout do Codigo (historico completo)'

    # ===============================================================================
    # PASSO 0b - CAPTURAR TIMESTAMP DE INICIO
    # ===============================================================================
    - script: |
        echo "##vso[task.setvariable variable=PIPELINE_START_TIME]$(date +%s)"
        echo "Timestamp de inicio registrado: $(date +%s)"
      displayName: 'Registrar Inicio do Pipeline'

    # ===============================================================================
    # PASSO 1 - DETECCAO DA LINGUAGEM
    # ===============================================================================
    - script: |
        echo "Inspecionando arquivos do repositorio..."

        if [ -f "requirements.txt" ] || [ -f "pyproject.toml" ]; then
          echo "Linguagem detectada: Python"
          echo "##vso[task.setvariable variable=isPython]true"

        elif ls *.csproj 2>/dev/null | grep -q .; then
          echo "Linguagem detectada: C# / .NET"
          echo "##vso[task.setvariable variable=isCSharp]true"

        elif [ -f "CMakeLists.txt" ] || [ -f "Makefile" ]; then
          echo "Linguagem detectada: C++"
          echo "##vso[task.setvariable variable=isCpp]true"

        elif [ -f "build.gradle.kts" ]; then
          echo "Linguagem detectada: Kotlin (Gradle Kotlin DSL)"
          echo "##vso[task.setvariable variable=isKotlin]true"

        elif [ -f "pom.xml" ] || [ -f "build.gradle" ]; then
          echo "Linguagem detectada: Java"
          echo "##vso[task.setvariable variable=isJava]true"

        elif [ -f "package.json" ]; then
          echo "Linguagem detectada: JavaScript / Node.js"
          echo "##vso[task.setvariable variable=isJS]true"

        else
          echo "##[error] Nenhum manifesto reconhecido encontrado."
          echo "##[error] Esperado: requirements.txt | pyproject.toml | package.json | *.csproj"
          exit 1
        fi
      displayName: 'Identificando Tecnologia do Repositorio'

    # ===============================================================================
    # PASSO 2 - SETUP DE RUNTIME
    # ===============================================================================
    - task: UsePythonVersion@0
      condition: eq(variables['isPython'], 'true')
      inputs:
        versionSpec: $(PYTHON_VERSION)
      displayName: 'Configurar Python $(PYTHON_VERSION)'

    - task: UseDotNet@2
      condition: eq(variables['isCSharp'], 'true')
      inputs:
        packageType: 'sdk'
        version: '8.x'
      displayName: 'Configurar .NET SDK 8.x'

    - task: UseNode@1
      condition: eq(variables['isJS'], 'true')
      inputs:
        version: $(NODE_VERSION)
      displayName: 'Configurar Node.js $(NODE_VERSION)'

    # ===============================================================================
    # PASSO 3 - PREPARAR ANALISE SONARCLOUD
    # ===============================================================================
    - task: SonarCloudPrepare@4
      condition: or(eq(variables['isPython'], 'true'), eq(variables['isJS'], 'true'))
      inputs:
        SonarCloud: $(SONAR_SERVICE_CONNECTION)
        organization: $(SONAR_ORGANIZATION)
        scannerMode: 'CLI'
        configMode: 'manual'
        cliProjectKey: $(SONAR_PROJECT_KEY)
        cliProjectName: $(SONAR_PROJECT_NAME)
        extraProperties: |
          sonar.python.coverage.reportPaths=$(System.DefaultWorkingDirectory)/coverage.xml
          sonar.javascript.lcov.reportPaths=$(System.DefaultWorkingDirectory)/coverage/lcov.info
          sonar.sources=.
          sonar.exclusions=**/venv/**,**/__pycache__/**,**/.pytest_cache/**
      displayName: 'Preparar SonarCloud (Python / JS)'

    # ===============================================================================
    # PASSO 4 - INSTALAR DEPENDENCIAS + RODAR TESTES
    # ===============================================================================

    # --- 4a. Python: Instalar dependencias ---
    - script: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov
      condition: eq(variables['isPython'], 'true')
      displayName: 'Instalar dependencias Python'

    # --- 4b. Python: Rodar testes (COM VERIFICACAO SE EXISTEM) ---
    - script: |
        # Verifica se existem arquivos de teste
        if find . -name "test_*.py" -o -name "*_test.py" 2>/dev/null | grep -q .; then
          echo "Testes encontrados! Executando pytest..."
          pytest --cov=. --cov-report=xml --cov-report=term
          echo "##vso[task.setvariable variable=testsFound]true"
        else
          echo "Nenhum teste encontrado - PR de configuracao/setup"
          echo "Testes devem ser adicionados posteriormente"
          echo "##vso[task.setvariable variable=testsFound]false"

          # Cria um coverage.xml vazio mas valido (sem arquivos ficticios)
          echo '<?xml version="1.0" ?>' > coverage.xml
          echo '<coverage version="7.0" timestamp="1234567890" lines-valid="0" lines-covered="0" line-rate="0" branches-valid="0" branches-covered="0" branch-rate="0" complexity="0">' >> coverage.xml
          echo '  <packages>' >> coverage.xml
          echo '  </packages>' >> coverage.xml
          echo '</coverage>' >> coverage.xml
          echo "coverage.xml vazio criado para SonarCloud"
        fi
      condition: eq(variables['isPython'], 'true')
      displayName: 'Testes Python + Cobertura'

    # --- 4c. Python: Corrigir caminhos no coverage.xml ---
    - script: |
        if [ -f coverage.xml ]; then
          if grep -q 'filename="src/' coverage.xml; then
            echo "Caminhos ja estao no formato correto."
          else
            echo "Corrigindo caminhos absolutos no coverage.xml..."
            sed -i -E 's|filename="[^"]*/src/|filename="src/|g' coverage.xml
            echo "Correcao aplicada."
          fi
          echo "Amostra do arquivo:"
          head -20 coverage.xml
        fi
      condition: eq(variables['isPython'], 'true')
      displayName: 'Corrigir Caminhos no coverage.xml'

    # ===============================================================================
    # PASSO 5 - EXECUTAR E PUBLICAR ANALISE SONARCLOUD
    # ===============================================================================
    - task: SonarCloudAnalyze@4
      displayName: 'Executar Scan SonarCloud'

    - task: SonarCloudPublish@4
      inputs:
        pollingTimeoutSec: '300'
      displayName: 'Publicar Metricas no Dashboard'

    # ===============================================================================
    # PASSO 6 - PUBLICAR RESULTADOS DE TESTES NO AZURE
    # ===============================================================================
    - task: PublishTestResults@2
      condition: and(always(), eq(variables['testsFound'], 'true'))
      inputs:
        testResultsFormat: 'JUnit'
        testResultsFiles: '**/test-results*.xml'
        failTaskOnFailedTests: true
      displayName: 'Publicar Resultados de Testes'

    # ===============================================================================
    # PASSO 7 - OBSERVABILIDADE (Datadog + Grafana Cloud)
    # ===============================================================================

    # --- 7a. Observabilidade: SUCESSO ---
    - script: |
        END_TIME=$(date +%s)
        DURATION=$((END_TIME - START_TIME))
        TIMESTAMP=$(date +%s)

        echo "Build concluido em ${DURATION}s. Enviando metricas..."

        if   [ "$IS_PYTHON" = 'true' ];  then LANG_TAG="python"
        elif [ "$IS_JS"     = 'true' ];  then LANG_TAG="javascript"
        elif [ "$IS_CSHARP" = 'true' ];  then LANG_TAG="dotnet"
        elif [ "$IS_CPP"    = 'true' ];  then LANG_TAG="cpp"
        elif [ "$IS_JAVA"   = 'true' ];  then LANG_TAG="java"
        elif [ "$IS_KOTLIN" = 'true' ];  then LANG_TAG="kotlin"
        else                                  LANG_TAG="unknown"
        fi

        # ------------------------------------------------------------------
        # 1. DATADOG
        # ------------------------------------------------------------------
        curl --silent --fail-with-body \
          -X POST "$DATADOG_URL" \
          -H "Content-Type: application/json" \
          -H "DD-API-KEY: $DD_API_KEY" \
          -d "{
            \"series\": [
              {
                \"metric\": \"cdd.pipeline.success\",
                \"points\": [[$TIMESTAMP, 1]],
                \"tags\": [\"project:$PROJECT\", \"branch:$BRANCH\", \"language:$LANG_TAG\"]
              },
              {
                \"metric\": \"cdd.pipeline.duration_seconds\",
                \"points\": [[$TIMESTAMP, $DURATION]],
                \"tags\": [\"project:$PROJECT\", \"branch:$BRANCH\", \"language:$LANG_TAG\"]
              }
            ]
          }" \
          && echo "Datadog: metricas enviadas." \
          || echo "Datadog: falha ao enviar metricas (nao critico)."

        # ------------------------------------------------------------------
        # 2. GRAFANA CLOUD - LOKI (logs)
        # ------------------------------------------------------------------
        LOKI_TIMESTAMP="${TIMESTAMP}000000000"

        curl --silent --fail-with-body \
          -X POST "$LOKI_ENDPOINT/loki/api/v1/push" \
          -H "Content-Type: application/json" \
          -u "$LOKI_USER:$LOKI_TOKEN" \
          -d "{
            \"streams\": [{
              \"stream\": {
                \"job\":     \"$JOB_NAME\",
                \"project\": \"$PROJECT\",
                \"branch\":  \"$BRANCH\",
                \"status\":  \"success\"
              },
              \"values\": [[
                \"$LOKI_TIMESTAMP\",
                \"[SUCCESS] Pipeline concluido em ${DURATION}s | Build=$BUILD_ID | Commit=$COMMIT\"
              ]]
            }]
          }" \
          && echo "Loki (Grafana Cloud): log de sucesso enviado." \
          || echo "Loki: falha ao enviar log (nao critico)."

        # ------------------------------------------------------------------
        # 3. GRAFANA CLOUD - PROMETHEUS (metricas)
        # ------------------------------------------------------------------
        echo "# HELP cdd_pipeline_success Resultado do pipeline (1=sucesso, 0=falha)
        # TYPE cdd_pipeline_success gauge
        cdd_pipeline_success{branch=\"$BRANCH\",project=\"$PROJECT\"} 1
        # HELP cdd_pipeline_duration_seconds Duracao total do pipeline em segundos
        # TYPE cdd_pipeline_duration_seconds gauge
        cdd_pipeline_duration_seconds{branch=\"$BRANCH\",project=\"$PROJECT\"} $DURATION" > /tmp/metrics.txt

        curl --silent --fail-with-body \
          -X POST "$PROMETHEUS_ENDPOINT" \
          -u "$PROMETHEUS_USER:$PROMETHEUS_TOKEN" \
          --data-binary @/tmp/metrics.txt \
          && echo "Prometheus (Grafana Cloud): metricas enviadas." \
          || echo "Prometheus: falha ao enviar metricas (nao critico)."

      condition: succeeded()
      displayName: 'Observabilidade - Sucesso'
      env:
        DD_API_KEY: $(DATADOG_API_KEY)
        BRANCH: $(Build.SourceBranchName)
        PROJECT: $(System.TeamProject)
        BUILD_ID: $(Build.BuildId)
        COMMIT: $(Build.SourceVersion)
        DATADOG_URL: $(DATADOG_API_URL)
        LOKI_ENDPOINT: $(LOKI_URL)
        LOKI_USER: $(LOKI_USER)
        LOKI_TOKEN: $(LOKI_TOKEN)
        PROMETHEUS_ENDPOINT: $(PROMETHEUS_URL)
        PROMETHEUS_USER: $(PROMETHEUS_USER)
        PROMETHEUS_TOKEN: $(PROMETHEUS_TOKEN)
        JOB_NAME: $(OBS_JOB_NAME)
        START_TIME: $(PIPELINE_START_TIME)
        IS_PYTHON: $(isPython)
        IS_JS: $(isJS)
        IS_CSHARP: $(isCSharp)
        IS_CPP: $(isCpp)
        IS_JAVA: $(isJava)
        IS_KOTLIN: $(isKotlin)

    # --- 7b. Observabilidade: FALHA ---
    - script: |
        TIMESTAMP=$(date +%s)
        LOKI_TIMESTAMP="${TIMESTAMP}000000000"

        echo "Build falhou. Enviando alertas de falha..."

        # Datadog
        curl --silent \
          -X POST "$DATADOG_URL" \
          -H "Content-Type: application/json" \
          -H "DD-API-KEY: $DD_API_KEY" \
          -d "{
            \"series\": [{
              \"metric\": \"cdd.pipeline.failure\",
              \"points\": [[$TIMESTAMP, 1]],
              \"tags\": [\"project:$PROJECT\", \"branch:$BRANCH\"]
            }]
          }" \
          && echo "Datadog: alerta de falha enviado." \
          || echo "Datadog: falha ao enviar alerta."

        # Loki (Grafana Cloud)
        curl --silent \
          -X POST "$LOKI_ENDPOINT/loki/api/v1/push" \
          -H "Content-Type: application/json" \
          -u "$LOKI_USER:$LOKI_TOKEN" \
          -d "{
            \"streams\": [{
              \"stream\": {
                \"job\":     \"$JOB_NAME\",
                \"project\": \"$PROJECT\",
                \"branch\":  \"$BRANCH\",
                \"status\":  \"failure\"
              },
              \"values\": [[
                \"$LOKI_TIMESTAMP\",
                \"[FAILURE] Pipeline falhou | Build=$BUILD_ID | Commit=$COMMIT\"
              ]]
            }]
          }" \
          && echo "Loki: log de falha enviado." \
          || echo "Loki: falha ao enviar log."

        # Prometheus (Grafana Cloud)
        echo "# HELP cdd_pipeline_success Resultado do pipeline
        # TYPE cdd_pipeline_success gauge
        cdd_pipeline_success{branch=\"$BRANCH\",project=\"$PROJECT\"} 0" > /tmp/metrics.txt

        curl --silent \
          -X POST "$PROMETHEUS_ENDPOINT" \
          -u "$PROMETHEUS_USER:$PROMETHEUS_TOKEN" \
          --data-binary @/tmp/metrics.txt \
          && echo "Prometheus: metrica de falha enviada." \
          || echo "Prometheus: falha ao enviar metrica."

      condition: failed()
      displayName: 'Observabilidade - Falha'
      env:
        DD_API_KEY: $(DATADOG_API_KEY)
        BRANCH: $(Build.SourceBranchName)
        PROJECT: $(System.TeamProject)
        BUILD_ID: $(Build.BuildId)
        COMMIT: $(Build.SourceVersion)
        DATADOG_URL: $(DATADOG_API_URL)
        LOKI_ENDPOINT: $(LOKI_URL)
        LOKI_USER: $(LOKI_USER)
        LOKI_TOKEN: $(LOKI_TOKEN)
        PROMETHEUS_ENDPOINT: $(PROMETHEUS_URL)
        PROMETHEUS_USER: $(PROMETHEUS_USER)
        PROMETHEUS_TOKEN: $(PROMETHEUS_TOKEN)
        JOB_NAME: $(OBS_JOB_NAME)
