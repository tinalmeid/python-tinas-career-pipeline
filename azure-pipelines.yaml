# yaml-language-server: $schema=https://json.schemastore.org/azure-pipelines
# azure-pipelines.yml
# ===================================================================================
# OBJETIVO       : Pipeline de CI para o python-tinas-career-pipeline
#                  Detecta Python via requirements.txt, roda testes com cobertura
#                  e envia métricas de observabilidade para Datadog, Loki e Prometheus.
#
# SUPORTE        : Python 3.12
# QUALIDADE      : SonarCloud (cobertura + análise estática)
# OBSERVABILIDADE: Datadog + Loki (Grafana Cloud) + Prometheus Pushgateway
#
# AUTOR          : Cristina de Almeida
# DATA           : Abril de 2026
# VERSION        : 1.0.7
# ===================================================================================
# É necessário configurar a pipeline no Azure DevOps:
# 1. Vá em Pipelines -> New Pipeline.
# 2. Selecione Azure Repos Git.
# 3. Selecione seu repositório.
# 4. Escolha Existing Azure Pipelines YAML file.
# 5. Aponte para o caminho azure-pipelines.yaml.

# --------------------------------------------------------------
# GATILHO: Executa em pushes e PRs para a branch main
# --------------------------------------------------------------
trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  # Variable Groups (secrets da Library)
  - group: DATADOG_API_KEY
  - group: OBSERVABILITY_KEYS

  # SonarCloud
  - name: SONAR_ORGANIZATION
    value: 'tinalmeid'

  - name: SONAR_PROJECT_KEY
    value: 'tinalmeid_python-tinas-career-pipeline'

  - name: SONAR_PROJECT_NAME
    value: 'tinalmeid_python-tinas-career-pipeline'

  - name: SONAR_SERVICE_CONNECTION
    value: 'SonarCloud-Service-Connection'

  # Versoes de runtime
  - name: PYTHON_VERSION
    value: '3.12'

  - name: NODE_VERSION
    value: '18'

  # Flags de linguagem
  - name: isPython
    value: 'false'

  - name: isCSharp
    value: 'false'

  - name: isCpp
    value: 'false'

  - name: isKotlin
    value: 'false'

  - name: isJava
    value: 'false'

  - name: isJS
    value: 'false'

  # Observabilidade
  - name: DATADOG_API_URL
    value: 'https://api.datadoghq.com/api/v1/series'

  - name: OBS_JOB_NAME
    value: 'azure-pipeline'

jobs:
- job: SmartBuild
  displayName: '🚀 Build and Quality - Detecção Automática'

  steps:

    # ===============================================================================
    # PASSO 1 - CHECKOUT
    # ===============================================================================
    - checkout: self
      fetchDepth: 0
      displayName: '📥 Passo 1: Checkout do Código'

    # ===============================================================================
    # PASSO 2 - CAPTURAR TIMESTAMP DE INICIO
    # ===============================================================================
    - script: |
        echo "##vso[task.setvariable variable=PIPELINE_START_TIME]$(date +%s)"
        echo "Timestamp de inicio registrado: $(date +%s)"
      displayName: '⏱️ Passo 2: Registrar Início'

    # ===============================================================================
    # PASSO 3 - CONFIGURAR PYTHON
    # ===============================================================================
    - task: UsePythonVersion@0
      inputs:
        versionSpec: $(PYTHON_VERSION)
      displayName: '🐍 Passo 3: Configurar Python $(PYTHON_VERSION)'

    # ===============================================================================
    # PASSO 4 - DETECÇÃO DA LINGUAGEM
    # ===============================================================================
    - script: |
        echo "Inspecionando arquivos do repositorio..."

        if [ -f "requirements.txt" ] || [ -f "pyproject.toml" ]; then
          echo "Linguagem detectada: Python"
          echo "##vso[task.setvariable variable=isPython]true"

        elif ls ./*.csproj 2>/dev/null | grep -q .; then
          echo "Linguagem detectada: C# / .NET"
          echo "##vso[task.setvariable variable=isCSharp]true"

        elif [ -f "CMakeLists.txt" ] || [ -f "Makefile" ]; then
          echo "Linguagem detectada: C++"
          echo "##vso[task.setvariable variable=isCpp]true"

        elif [ -f "build.gradle.kts" ]; then
          echo "Linguagem detectada: Kotlin (Gradle Kotlin DSL)"
          echo "##vso[task.setvariable variable=isKotlin]true"

        elif [ -f "pom.xml" ] || [ -f "build.gradle" ]; then
          echo "Linguagem detectada: Java"
          echo "##vso[task.setvariable variable=isJava]true"

        elif [ -f "package.json" ]; then
          echo "Linguagem detectada: JavaScript / Node.js"
          echo "##vso[task.setvariable variable=isJS]true"

        else
          echo "##[error] Nenhum manifesto reconhecido encontrado."
          exit 1
        fi
      displayName: '🔍 Passo 4: Identificar Linguagem'

    # ===============================================================================
    # PASSO 5 - INSTALAR DEPENDENCIAS
    # ===============================================================================
    - script: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov
      condition: eq(variables['isPython'], 'true')
      displayName: '📦 Passo 5: Instalar Dependências'

    # ===============================================================================
    # PASSO 6 - EXECUTAR TESTES
    # ===============================================================================
    - script: |
        if find . -name "test_*.py" -o -name "*_test.py" 2>/dev/null | grep -q .; then
          echo "Testes encontrados! Executando pytest..."
          pytest --cov=. --cov-report=xml --cov-report=term
          echo "##vso[task.setvariable variable=testsFound]true"
        else
          echo "Nenhum teste encontrado - PR de configuracao/setup"
          echo "##vso[task.setvariable variable=testsFound]false"

          # Cria um coverage.xml vazio mas valido
          echo '<?xml version="1.0" ?>' > coverage.xml
          echo '<coverage version="7.0" timestamp="1234567890" lines-valid="0" lines-covered="0" line-rate="0" branches-valid="0" branches-covered="0" branch-rate="0" complexity="0">' >> coverage.xml
          echo '  <packages>' >> coverage.xml
          echo '  </packages>' >> coverage.xml
          echo '</coverage>' >> coverage.xml
          echo "coverage.xml vazio criado para SonarCloud"
        fi
      condition: eq(variables['isPython'], 'true')
      displayName: '🧪 Passo 6: Executar Testes & Cobertura'

    # ===============================================================================
    # PASSO 7 - SONARCLOUD PREPARE
    # ===============================================================================
    - task: SonarCloudPrepare@4
      condition: or(eq(variables['isPython'], 'true'), eq(variables['isJS'], 'true'))
      inputs:
        SonarCloud: $(SONAR_SERVICE_CONNECTION)
        organization: $(SONAR_ORGANIZATION)
        scannerMode: 'CLI'
        configMode: 'manual'
        cliProjectKey: $(SONAR_PROJECT_KEY)
        cliProjectName: $(SONAR_PROJECT_NAME)
        extraProperties: |
          sonar.python.version=3.12
          sonar.python.coverage.reportPaths=$(System.DefaultWorkingDirectory)/coverage.xml
          sonar.sources=.
          sonar.exclusions=**/venv/**,**/__pycache__/**,**/.pytest_cache/**
      displayName: '☁️ Passo 7: Configurar SonarCloud'

    # ===============================================================================
    # PASSO 8 - SONARCLOUD ANALYZE
    # ===============================================================================
    - task: SonarCloudAnalyze@4
      displayName: '🔬 Passo 8: Analisar Código'

    # ===============================================================================
    # PASSO 9 - SONARCLOUD PUBLISH
    # ===============================================================================
    - task: SonarCloudPublish@4
      inputs:
        pollingTimeoutSec: '300'
      displayName: '📊 Passo 9: Publicar Resultados'

    # ===============================================================================
    # PASSO 10 - OBSERVABILIDADE SUCESSO
    # ===============================================================================
    - script: |
        END_TIME=$(date +%s)
        DURATION=$((END_TIME - START_TIME))
        TIMESTAMP=$(date +%s)

        echo "Build concluido em ${DURATION}s. Enviando metricas..."

        # Escapa espacos nas tags
        BRANCH_SAFE=$(echo "$BRANCH" | tr ' ' '_')
        PROJECT_SAFE=$(echo "$PROJECT" | tr ' ' '_')
        REPO_SAFE=$(echo "$REPO" | tr ' ' '_')

        if   [ "$IS_PYTHON" = 'true' ];  then LANG_TAG="python"
        elif [ "$IS_JS"     = 'true' ];  then LANG_TAG="javascript"
        elif [ "$IS_CSHARP" = 'true' ];  then LANG_TAG="dotnet"
        elif [ "$IS_CPP"    = 'true' ];  then LANG_TAG="cpp"
        elif [ "$IS_JAVA"   = 'true' ];  then LANG_TAG="java"
        elif [ "$IS_KOTLIN" = 'true' ];  then LANG_TAG="kotlin"
        else                                  LANG_TAG="unknown"
        fi

        # ------------------------------------------------------------------
        # 1. DATADOG
        # ------------------------------------------------------------------
        curl --silent --fail-with-body \
          -X POST "$DATADOG_URL" \
          -H "Content-Type: application/json" \
          -H "DD-API-KEY: $DD_API_KEY" \
          -d "{
            \"series\": [
              {
                \"metric\": \"cdd.pipeline.success\",
                \"points\": [[$TIMESTAMP, 1]],
                \"tags\": [\"project:$PROJECT_SAFE\", \"repo:$REPO_SAFE\", \"branch:$BRANCH_SAFE\", \"language:$LANG_TAG\"]
              },
              {
                \"metric\": \"cdd.pipeline.duration_seconds\",
                \"points\": [[$TIMESTAMP, $DURATION]],
                \"tags\": [\"project:$PROJECT_SAFE\", \"repo:$REPO_SAFE\", \"branch:$BRANCH_SAFE\", \"language:$LANG_TAG\"]
              }
            ]
          }" \
          && echo "Datadog: metricas enviadas." \
          || echo "Datadog: falha ao enviar metricas (nao critico)."

        # ------------------------------------------------------------------
        # 2. GRAFANA CLOUD - LOKI (logs)
        # ------------------------------------------------------------------
        LOKI_TIMESTAMP="${TIMESTAMP}000000000"

        curl --silent --fail-with-body \
          -X POST "$LOKI_ENDPOINT/loki/api/v1/push" \
          -H "Content-Type: application/json" \
          -u "$LOKI_USER:$LOKI_TOKEN" \
          -d "{
            \"streams\": [{
              \"stream\": {
                \"job\":     \"$JOB_NAME\",
                \"project\": \"$PROJECT_SAFE\",
                \"repo\":    \"$REPO_SAFE\",
                \"branch\":  \"$BRANCH_SAFE\",
                \"status\":  \"success\"
              },
              \"values\": [[
                \"$LOKI_TIMESTAMP\",
                \"[SUCCESS] Pipeline concluido em ${DURATION}s | Repo=$REPO | Build=$BUILD_ID | Commit=$COMMIT\"
              ]]
            }]
          }" \
          && echo "Loki (Grafana Cloud): log de sucesso enviado." \
          || echo "Loki: falha ao enviar log (nao critico)."

        # ------------------------------------------------------------------
        # 3. GRAFANA CLOUD - PROMETHEUS (metricas via InfluxDB line protocol)
        # ------------------------------------------------------------------
        INFLUX_URL=$(echo "$PROMETHEUS_ENDPOINT" | sed 's|prometheus-prod|influx-prod|' | sed 's|/api/prom/push|/api/v1/push/influx/write|')
        echo "InfluxDB URL construida: $INFLUX_URL"

        INFLUX_TIMESTAMP="${TIMESTAMP}000000000"
        echo "cdd_pipeline,branch=${BRANCH_SAFE},project=${PROJECT_SAFE},repo=${REPO_SAFE} success=1,duration_seconds=$DURATION $INFLUX_TIMESTAMP" > /tmp/metrics.txt
        echo "Payload: $(cat /tmp/metrics.txt)"

        RESPONSE=$(curl --silent --write-out "HTTP_CODE:%{http_code}" \
          -X POST "$INFLUX_URL" \
          -H "Content-Type: text/plain" \
          -u "$PROMETHEUS_USER:$PROMETHEUS_TOKEN" \
          --data-binary @/tmp/metrics.txt 2>&1)

        HTTP_CODE=$(echo "$RESPONSE" | grep -o "HTTP_CODE:[0-9]*" | cut -d: -f2)
        BODY=$(echo "$RESPONSE" | sed 's/HTTP_CODE:[0-9]*$//')

        if [ "$HTTP_CODE" = "204" ] || [ "$HTTP_CODE" = "200" ]; then
          echo "Prometheus/InfluxDB (Grafana Cloud): metricas enviadas. HTTP $HTTP_CODE"
        else
          echo "Prometheus: falha HTTP $HTTP_CODE - $BODY"
        fi

      condition: succeeded()
      displayName: '📡 Passo 10: Observabilidade (Sucesso)'
      env:
        DD_API_KEY: $(DATADOG_API_KEY)
        BRANCH: $(Build.SourceBranchName)
        PROJECT: $(System.TeamProject)
        REPO: $(Build.Repository.Name)
        BUILD_ID: $(Build.BuildId)
        COMMIT: $(Build.SourceVersion)
        DATADOG_URL: $(DATADOG_API_URL)
        LOKI_ENDPOINT: $(LOKI_URL)
        LOKI_USER: $(LOKI_USER)
        LOKI_TOKEN: $(LOKI_TOKEN)
        PROMETHEUS_ENDPOINT: $(PROMETHEUS_URL)
        PROMETHEUS_USER: $(PROMETHEUS_USER)
        PROMETHEUS_TOKEN: $(PROMETHEUS_TOKEN)
        JOB_NAME: $(OBS_JOB_NAME)
        START_TIME: $(PIPELINE_START_TIME)
        IS_PYTHON: $(isPython)
        IS_JS: $(isJS)
        IS_CSHARP: $(isCSharp)
        IS_CPP: $(isCpp)
        IS_JAVA: $(isJava)
        IS_KOTLIN: $(isKotlin)

    # ===============================================================================
    # PASSO 11 - OBSERVABILIDADE FALHA
    # ===============================================================================
    - script: |
        TIMESTAMP=$(date +%s)
        LOKI_TIMESTAMP="${TIMESTAMP}000000000"

        echo "Build falhou. Enviando alertas de falha..."

        # Escapa espacos nas tags
        BRANCH_SAFE=$(echo "$BRANCH" | tr ' ' '_')
        PROJECT_SAFE=$(echo "$PROJECT" | tr ' ' '_')
        REPO_SAFE=$(echo "$REPO" | tr ' ' '_')

        # Datadog
        curl --silent \
          -X POST "$DATADOG_URL" \
          -H "Content-Type: application/json" \
          -H "DD-API-KEY: $DD_API_KEY" \
          -d "{
            \"series\": [{
              \"metric\": \"cdd.pipeline.failure\",
              \"points\": [[$TIMESTAMP, 1]],
              \"tags\": [\"project:$PROJECT_SAFE\", \"repo:$REPO_SAFE\", \"branch:$BRANCH_SAFE\"]
            }]
          }" \
          && echo "Datadog: alerta de falha enviado." \
          || echo "Datadog: falha ao enviar alerta."

        # Loki (Grafana Cloud)
        curl --silent \
          -X POST "$LOKI_ENDPOINT/loki/api/v1/push" \
          -H "Content-Type: application/json" \
          -u "$LOKI_USER:$LOKI_TOKEN" \
          -d "{
            \"streams\": [{
              \"stream\": {
                \"job\":     \"$JOB_NAME\",
                \"project\": \"$PROJECT_SAFE\",
                \"repo\":    \"$REPO_SAFE\",
                \"branch\":  \"$BRANCH_SAFE\",
                \"status\":  \"failure\"
              },
              \"values\": [[
                \"$LOKI_TIMESTAMP\",
                \"[FAILURE] Pipeline falhou | Repo=$REPO | Build=$BUILD_ID | Commit=$COMMIT\"
              ]]
            }]
          }" \
          && echo "Loki: log de falha enviado." \
          || echo "Loki: falha ao enviar log."

        # Prometheus (Grafana Cloud via InfluxDB line protocol)
        INFLUX_URL=$(echo "$PROMETHEUS_ENDPOINT" | sed 's|prometheus-prod|influx-prod|' | sed 's|/api/prom/push|/api/v1/push/influx/write|')

        INFLUX_TIMESTAMP="${TIMESTAMP}000000000"
        echo "cdd_pipeline,branch=${BRANCH_SAFE},project=${PROJECT_SAFE},repo=${REPO_SAFE} success=0 $INFLUX_TIMESTAMP" > /tmp/metrics.txt

        RESPONSE=$(curl --silent --write-out "HTTP_CODE:%{http_code}" \
          -X POST "$INFLUX_URL" \
          -H "Content-Type: text/plain" \
          -u "$PROMETHEUS_USER:$PROMETHEUS_TOKEN" \
          --data-binary @/tmp/metrics.txt 2>&1)

        HTTP_CODE=$(echo "$RESPONSE" | grep -o "HTTP_CODE:[0-9]*" | cut -d: -f2)

        if [ "$HTTP_CODE" = "204" ] || [ "$HTTP_CODE" = "200" ]; then
          echo "Prometheus: metrica de falha enviada. HTTP $HTTP_CODE"
        else
          BODY=$(echo "$RESPONSE" | sed 's/HTTP_CODE:[0-9]*$//')
          echo "Prometheus: falha HTTP $HTTP_CODE - $BODY"
        fi

      condition: failed()
      displayName: '🚨 Passo 11: Observabilidade (Falha)'
      env:
        DD_API_KEY: $(DATADOG_API_KEY)
        BRANCH: $(Build.SourceBranchName)
        PROJECT: $(System.TeamProject)
        REPO: $(Build.Repository.Name)
        BUILD_ID: $(Build.BuildId)
        COMMIT: $(Build.SourceVersion)
        DATADOG_URL: $(DATADOG_API_URL)
        LOKI_ENDPOINT: $(LOKI_URL)
        LOKI_USER: $(LOKI_USER)
        LOKI_TOKEN: $(LOKI_TOKEN)
        PROMETHEUS_ENDPOINT: $(PROMETHEUS_URL)
        PROMETHEUS_USER: $(PROMETHEUS_USER)
        PROMETHEUS_TOKEN: $(PROMETHEUS_TOKEN)
        JOB_NAME: $(OBS_JOB_NAME)

    # ===============================================================================
    # PASSO 12 - RESUMO
    # ===============================================================================
    - script: |
        echo "=========================================="
        echo "🚀 CI - python-tinas-career-pipeline"
        echo "=========================================="
        echo "✅ Pipeline concluído com sucesso!"
        echo "📊 Branch: $BRANCH"
        echo "📦 Build ID: $BUILD_ID"
        echo "🔗 Commit: $COMMIT"

        if [ "$TESTS_FOUND" = 'true' ]; then
          echo "✅ Testes foram executados e resultados publicados."
        else
          echo "⚠️ Nenhum teste encontrado - Pipeline de configuracao/setup."
          echo "💡 Adicione testes posteriormente para obter metricas de cobertura."
        fi

        echo "=========================================="
      condition: succeeded()
      displayName: '📝 Passo 12: Resumo da Execução'
      env:
        BRANCH: $(Build.SourceBranchName)
        BUILD_ID: $(Build.BuildId)
        COMMIT: $(Build.SourceVersion)
        TESTS_FOUND: $(testsFound)

    # ===============================================================================
    # PASSO 13 - NOTIFICAÇÃO DE FALHA
    # ===============================================================================
    - script: |
        echo "=========================================="
        echo "❌ PIPELINE FALHOU"
        echo "=========================================="
        echo "📊 Branch: $BRANCH"
        echo "📦 Build ID: $BUILD_ID"
        echo "🔗 Commit: $COMMIT"
        echo "=========================================="
        echo "💡 Verifique os logs acima para mais detalhes"
      condition: failed()
      displayName: '🚨 Passo 13: Notificação de Falha'
      env:
        BRANCH: $(Build.SourceBranchName)
        BUILD_ID: $(Build.BuildId)
        COMMIT: $(Build.SourceVersion)

# @file Fim o arquivo azure-pipelines.yaml
