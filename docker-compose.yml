# @file docker-compose.yml
# @description Orquestração dos serviços de observabilidade (Prometheus, Grafana, Loki e Promtail) para o projeto python_tinas_career_pipeline.
# Este arquivo define os serviços necessários para monitorar e coletar logs dos microsserviços do pipeline,
# garantindo uma visão completa do desempenho e saúde do sistema.
#
# @author Tina de Almeida
# @date Abril 2026
# @version 1.0.0

version: '3.8'

# --- Serviços de Observabilidade ---
services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - observability
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

# --- Serviços de Observabilidade ---
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SECURITY_ADMIN_USER=admin
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    networks:
      - observability
    depends_on:
      - prometheus

  loki:
    image: grafana/loki:latest
    container_name: loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./docker/loki/loki-config.yaml:/etc/loki/loki-config.yaml
      - loki_data:/loki
    networks:
      - observability
    command: -config.file=/etc/loki/loki-config.yaml

# --- Serviço de Coleta de Logs ---
  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    restart: unless-stopped
    volumes:
      - ./docker/promtail/promtail-config.yaml:/etc/promtail/promtail-config.yaml
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    ports:
      - "9080:9080"
    networks:
      - observability
    command: -config.file=/etc/promtail/promtail-config.yaml
    depends_on:
      - loki

networks:
  observability:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:
  loki_data:

# @file Fim do arquivo docker-compose.yml
